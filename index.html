<script>
    // These names match your GitHub files EXACTLY (no spaces, double extensions)
    const images = [
        "villa1.jpeg.jpg",
        "villa2.jpeg.jpg",
        "villa3.jpeg.jpg",
        "villa4.jpeg.jpg",
        "villa5.jpeg.jpg",
        "villa6.jpeg.jpg",
        "villa7.jpeg.jpg",
        "villa8.jpeg.jpeg", 
        "villa9.jpeg.jpg",
        "villa10.jpeg.jpg"
    ];

    const gallery = document.getElementById("gallery");

    images.forEach(imgFile => {
        const img = document.createElement("img");
        img.src = imgFile;
        img.alt = "Villa Photo";
        img.style.width = "100%";
        img.style.height = "200px";
        img.style.objectFit = "cover";
        img.style.borderRadius = "8px";
        // This helps us see if it's still failing
        img.onerror = function() { console.log("Missing: " + imgFile); };
        gallery.appendChild(img);
    });
</script>
