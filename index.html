        }
        header {
            background-color: #2c3e50;

            width: 90%;

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

            margin-top: 20px;

        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;

            transition: transform 0.3s ease;

        .gallery img:hover {
            transform: scale(1.05);
